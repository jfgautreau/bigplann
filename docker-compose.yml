# Stack du test simplifie : PostgreSQL + application Next.js.
# Compatible Docker Compose ET Podman Compose :
#   docker compose up -d   |   podman compose up -d
#
# Les variables proviennent du fichier .env (voir .env.example).

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      # Publie pour pouvoir lancer Prisma depuis la machine hote si besoin.
      - "5432:5432"
    volumes:
      # Volume externe : les donnees survivent a la recreation du conteneur.
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10

  web:
    build: .
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      # host = "db" (nom du service) a l'interieur du reseau compose.
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}?schema=public
      SESSION_SECRET: ${SESSION_SECRET}
      ADMIN_EMAIL: ${ADMIN_EMAIL}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD}
      ADMIN_NAME: ${ADMIN_NAME}
      NODE_ENV: production
    ports:
      - "3000:3000"

volumes:
  pgdata:
